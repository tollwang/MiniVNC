name: Build MiniVNC (Windows)

# 触发条件:推送到 main/master、打 v* 标签、或在 Actions 页手动运行
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # 打 tag 时需要写权限来创建 Release

jobs:
  build:
    runs-on: windows-latest   # WPF + 单文件必须在 Windows 上编译

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 自包含单文件编译。
      # 关键:命令行覆盖了 csproj 里的 PublishAot=true ——
      # WPF 在 .NET 9 不支持 Native AOT,这里强制关闭,改用单文件自包含。
      - name: 编译(自包含单文件)
        shell: bash
        run: |
          dotnet publish MiniVNC/MiniVNC.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishAot=false \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=none \
            -o publish

      - name: 查看产物
        shell: bash
        run: ls -lh publish

      - name: 上传编译产物(可在 Actions 运行页下载)
        uses: actions/upload-artifact@v4
        with:
          name: MiniVNC-win-x64
          path: publish/
          if-no-files-found: error

      # 仅当推送的是 v* 标签时,额外创建一个公开 Release,方便直接下载 exe
      - name: 创建 Release(打 tag 时)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME}"
          NOTES_FILE="$(mktemp)"

          # 从 CHANGELOG.md 提取本版小节(## vX.Y.Z 到下一个 ## 之间)作为发布说明
          SECTION="$(awk -v ver="## ${VER}" '
            $0 == ver { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)"

          if [ -n "$SECTION" ]; then
            printf '%s\n' "$SECTION" > "$NOTES_FILE"
          else
            # CHANGELOG 里没有该版本小节时,回退到提交记录提示
            echo "本版变更详见提交记录与 CHANGELOG.md。" > "$NOTES_FILE"
          fi

          # 统一附上下载说明
          {
            echo ""
            echo "---"
            echo "Windows x64 单文件自包含版本,免安装、目标机无需预装 .NET 运行时。"
          } >> "$NOTES_FILE"

          gh release create "$VER" publish/MiniVNC.exe \
            --title "MiniVNC ${VER}" \
            --notes-file "$NOTES_FILE"

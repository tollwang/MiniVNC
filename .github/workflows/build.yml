name: Build MiniVNC (Windows)

# 触发条件:推送到 main/master、打 v* 标签、或在 Actions 页手动运行
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # 打 tag 时需要写权限来创建 Release

jobs:
  build:
    runs-on: windows-latest   # WPF + 单文件必须在 Windows 上编译

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 自包含单文件编译。
      # 关键:命令行覆盖了 csproj 里的 PublishAot=true ——
      # WPF 在 .NET 9 不支持 Native AOT,这里强制关闭,改用单文件自包含。
      - name: 编译(自包含单文件)
        shell: bash
        run: |
          dotnet publish MiniVNC/MiniVNC.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishAot=false \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=none \
            -o publish

      - name: 查看产物
        shell: bash
        run: ls -lh publish

      - name: 上传编译产物(可在 Actions 运行页下载)
        uses: actions/upload-artifact@v4
        with:
          name: MiniVNC-win-x64
          path: publish/
          if-no-files-found: error

      # 仅当推送的是 v* 标签时,额外创建一个公开 Release,方便直接下载 exe
      - name: 创建 Release(打 tag 时)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" publish/MiniVNC.exe \
            --title "MiniVNC ${GITHUB_REF_NAME}" \
            --notes "自动编译的 Windows x64 单文件版本(免安装,目标机无需 .NET 运行时)。"
